---
# Allow inbound HTTP to vcd-app; blocked IPs are patched into except[] by the sidecar
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vcd-block-policy
spec:
  podSelector:
    matchLabels:
      app: vcd
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
            except: []    # sidecar patches this list every SYNC_INTERVAL seconds
      ports:
        - protocol: TCP
          port: 4000

---
# Allow vcd-sidecar to reach Redis and the Kubernetes API; deny all other egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vcd-egress-policy
spec:
  podSelector:
    matchLabels:
      app: vcd
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    # Kubernetes API server (for NetworkPolicy patching)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    # DNS
    - ports:
        - protocol: UDP
          port: 53
