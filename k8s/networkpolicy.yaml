---
# Allow inbound HTTP to vcd-app from anywhere within the cluster
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vcd-allow-ingress
spec:
  podSelector:
    matchLabels:
      app: vcd
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 4000

---
# Allow vcd-sidecar to reach Redis; deny all other egress from the pod
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vcd-egress-redis-only
spec:
  podSelector:
    matchLabels:
      app: vcd
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    # Allow DNS resolution
    - ports:
        - protocol: UDP
          port: 53
